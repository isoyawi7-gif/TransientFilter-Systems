<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surge Protection Research</title>

<style>

/* ===== GLOBAL ===== */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(rgba(2,6,23,0.8), rgba(15,23,42,0.9)), url("logos.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
}

/* ===== HEADER ===== */
header {
    text-align: center;
    padding: 30px;
    background: #020617;
    color: #38bdf8;
}

/* ===== SECTION ===== */
section {
    padding: 20px;
    margin: 15px;
    background: rgba(30,41,59,0.5);
    backdrop-filter: blur(10px);
    border-radius: 10px;
}

/* ===== CONTENT ===== */
.content {
    display: none;
}

/* ===== DATA SYSTEM ===== */
.system{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-top:30px;
    align-items:center;
    flex-wrap:wrap;
}

.block{
    width:170px;
    padding:15px;
    border:2px solid black;
    background:white;
    color:black;
    font-weight:bold;
    text-align:center;
    border-radius:8px;
}

.line{
    width:90px;
    height:8px;
    background:#bbb;
    position:relative;
}

.vertical{
    width:8px;
    height:80px;
}

.branch{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ===== CONTROLS ===== */
.controls{
    margin-top:25px;
    text-align:center;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    background:#38bdf8;
    cursor:pointer;
}

.slider{
    width:200px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

    .system{
        flex-direction:column;
    }

    .line{
        display:none;
    }

    .block{
        width:90%;
    }
}

</style>
</head>

<body>

<header>
<h1>Telecom Power System Simulation</h1>
<p>Surge Protection Research</p>
</header>

<!-- DATA -->
<section id="data">
<h2 onclick="toggleSection(this)">Data Simulation</h2>

<div class="content" style="display:block;">

<h3 style="text-align:center;">Telecom Power Simulator</h3>

<p style="text-align:center;">
Simulation of Vodafone PNG telecom power system
</p>

<div class="system">

  <div class="block">
      AC GRID<br>
      Voltage: <span id="gridV">240V</span>
  </div>

  <div class="line"></div>

  <div class="block">
      RECTIFIER<br>
      AC → DC
  </div>

  <div class="line"></div>

  <div class="block">
      DC BUS<br>
      -48V
  </div>

  <div class="branch">
    <div class="line vertical"></div>
    <div class="block">
        BATTERY<br>
        SOC: <span id="soc">80.0</span>%
    </div>
  </div>

  <div class="branch">
    <div class="line vertical"></div>
    <div class="block">
        LOAD<br>
        Current: <span id="loadCurrent">20</span>A
    </div>
  </div>

</div>

<div class="controls">
<button onclick="toggleGrid()">Toggle Grid</button><br>
<button onclick="manualStart()">START Genset</button>
<button onclick="manualStop()">STOP Genset</button>

<br><br>

Load Simulation<br>
<input type="range" min="5" max="120" value="20" class="slider" id="loadSlider">
</div>

<div style="text-align:center; margin-top:20px;">
Grid: <span id="gridStatus">ON</span> |
Genset: <span id="genStatus">OFF</span>
</div>

</div>
</section>

<script>

/* ===== TOGGLE SECTION ===== */
function toggleSection(el){
    const content = el.nextElementSibling;
    content.style.display = content.style.display === "block" ? "none" : "block";
}

/* ===== SIMULATION ===== */
let grid = true;
let genset = false;
let soc = 80;
let load = 20;

/* SLIDER */
document.getElementById("loadSlider").oninput = function(){
    load = this.value;
    document.getElementById("loadCurrent").innerText = load;
}

/* GRID */
function toggleGrid(){
    grid = !grid;
    document.getElementById("gridStatus").innerText = grid ? "ON" : "OFF";
}

/* GENSET */
function manualStart(){
    genset = true;
    document.getElementById("genStatus").innerText = "ON";
}

function manualStop(){
    genset = false;
    document.getElementById("genStatus").innerText = "OFF";
}

/* MAIN LOOP */
setInterval(()=>{

    if(grid){
        soc += 0.2;
    } else {
        soc -= 0.3;
    }

    if(genset){
        soc += 0.25;
    }

    soc -= load * 0.002;

    if(soc > 100) soc = 100;
    if(soc < 0) soc = 0;

    document.getElementById("soc").innerText = soc.toFixed(1);
    document.getElementById("gridV").innerText = grid ? "240V" : "0V";

},200);

</script>

</body>
</html>
