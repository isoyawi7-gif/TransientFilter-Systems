<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surge Protection Research</title>

<style>

/* ===== GLOBAL ===== */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(rgba(2,6,23,0.8), rgba(15,23,42,0.9)), url("logos.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
}

/* ===== HEADER ===== */
header {
    text-align: center;
    padding: 30px;
    background: #020617;
}

/* ===== NAV ===== */
.menu-toggle {
    display: none;
    width: 100%;
    padding: 10px;
    background: #1e293b;
    color: white;
    border: none;
}

nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    background: #1e293b;
    padding: 10px;
}

nav a {
    color: white;
    text-decoration: none;
}

/* ===== SECTION ===== */
section {
    padding: 20px;
    margin: 10px;
    background: rgba(30,41,59,0.5);
    backdrop-filter: blur(10px);
    border-radius: 10px;
}

.content {
    display: none;
}

/* ===== SIMULATION ===== */
.system {
    display: flex;
    flex-wrap: wrap;   /* FIX MOBILE */
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
}

.block {
    width: 150px;
    padding: 10px;
    background: white;
    color: black;
    text-align: center;
    border-radius: 8px;
    font-weight: bold;
}

.line {
    width: 60px;
    height: 6px;
    background: #bbb;
}

.vertical {
    width: 6px;
    height: 60px;
}

.branch {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.controls {
    text-align: center;
    margin-top: 20px;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    background: #38bdf8;
    cursor: pointer;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

    nav {
        display: none;
        flex-direction: column;
    }

    nav.active {
        display: flex;
    }

    .menu-toggle {
        display: block;
    }

    .block {
        width: 100%;   /* FULL WIDTH ON MOBILE */
    }

    .line {
        display: none; /* hide lines on small screen */
    }
}

</style>
</head>

<body>

<header>
<h1>Surge Protection System</h1>
<p>Telecom Power Simulation</p>
</header>

<button class="menu-toggle" onclick="toggleMenu()">☰ Menu</button>

<nav>
<a href="#data">Simulation</a>
</nav>

<!-- DATA SIMULATION -->
<section id="data">
<h2 onclick="toggleSection(this)">Data Simulation</h2>

<div class="content">

<div class="system">

<div class="block">AC GRID<br><span id="gridV">240V</span></div>

<div class="block">RECTIFIER</div>

<div class="block">DC BUS<br>-48V</div>

<div class="branch">
<div class="block">BATTERY<br><span id="soc">80%</span></div>
</div>

<div class="branch">
<div class="block">LOAD<br><span id="loadCurrent">20A</span></div>
</div>

</div>

<div class="controls">
<button onclick="toggleGrid()">Toggle Grid</button>
<br>
Load:
<input type="range" min="5" max="100" value="20" id="loadSlider">
</div>

</div>
</section>

<script>

/* ===== UI ===== */
function toggleSection(el){
    const c = el.nextElementSibling;
    c.style.display = c.style.display === "block" ? "none" : "block";
}

function toggleMenu(){
    document.querySelector("nav").classList.toggle("active");
}

/* ===== SIMULATION ===== */
let grid = true;
let soc = 80;
let load = 20;

document.getElementById("loadSlider").oninput = function(){
    load = this.value;
    document.getElementById("loadCurrent").innerText = load + "A";
}

function toggleGrid(){
    grid = !grid;
}

setInterval(()=>{
    
    if(grid){
        soc += 0.2;
    } else {
        soc -= 0.3;
    }

    soc -= load * 0.002;

    if(soc > 100) soc = 100;
    if(soc < 0) soc = 0;

    document.getElementById("soc").innerText = soc.toFixed(1) + "%";
    document.getElementById("gridV").innerText = grid ? "240V" : "0V";

},200);

</script>

</body>
</html>
